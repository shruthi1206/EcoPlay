<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoPlay - Carbon Footprint Analyzer</title>
  <link rel="stylesheet" href="climate-game.css" />
</head>
<body>

  <!-- Header -->
  <header class="game-header">
    <div class="header-content">
      <h1>🌍 Carbon Footprint Analyzer</h1>
      <p>
        Choose environmentally friendly actions to reduce global warming.
      </p>
    </div>
    <a href="index.html" class="back-link">⬅ Back to EcoPlay</a>
  </header>

  <!-- Dashboard -->
  <section class="dashboard">
    <div class="stat-card">
      <span class="label">Score</span>
      <span id="score">0</span>
    </div>

    <div class="stat-card">
      <span class="label">Progress</span>
      <span id="progress">1 / 15</span>
    </div>

    <div class="stat-card">
      <span class="label">Time Left</span>
      <span id="timer">60s</span>
    </div>

    <div class="stat-card">
      <span class="label">Accuracy</span>
      <span id="accuracy">0%</span>
    </div>
  </section>

  <!-- Progress Bar -->
  <div class="progress-wrapper">
    <div id="progress-bar"></div>
  </div>

  <!-- Scenario Card -->
  <section class="item-section">
    <div class="item-card">
      <div id="scenario-icon" class="item-emoji">🏭</div>
      <h2 id="scenario-title">Transportation Choice</h2>
      <p id="scenario-description">
        Which option produces fewer greenhouse gas emissions?
      </p>
    </div>
  </section>

  <!-- Options -->
  <section class="bins-container" id="options-container">
    <!-- Generated by climate-game.js -->
  </section>

  <!-- Feedback -->
  <section class="feedback-section">
    <div id="feedback-message"></div>
  </section>

  <!-- Final Result Modal -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2>🏆 Analysis Completed</h2>
      <p id="final-badge"></p>
      <p id="final-score"></p>
      <p id="final-accuracy"></p>

      <button onclick="restartGame()" class="primary-btn">
        🔄 Play Again
      </button>

      <a href="index.html" class="secondary-btn">
        ⬅ Return to EcoPlay
      </a>
    </div>
  </div>

  <script src="climate-game.js"></script>
</body>
</html>
